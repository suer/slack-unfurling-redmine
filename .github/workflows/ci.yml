name: CI

on: [push]

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: slack-unfurling-redmine
      - run: bundle exec ruby tests/unit/test_handler.rb
        working-directory: ./slack-unfurling-redmine
